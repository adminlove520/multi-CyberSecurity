# Submodule 手动更新工作流
# 需要更新时在 GitHub Actions 页面手动触发即可
# 不再每天自动运行，避免 PR 堆积
name: Update Submodules

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Commit message'
        required: false
        default: 'chore: update submodules'

jobs:
  update-submodules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Update submodules
        run: |
          git submodule update --remote --recursive

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet HEAD; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No submodule updates found"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            git diff --stat
          fi

      - name: Push updates
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git checkout -b update-submodules-${{ github.run_id }}
          git add .
          git commit -m "${{ github.event.inputs.message || 'chore: update submodules' }}"
          git push --force-with-lease origin update-submodules-${{ github.run_id }}
          echo "branch=update-submodules-${{ github.run_id }}" >> $GITHUB_OUTPUT

      - name: Create PR
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.push.outputs.branch }}
          title: "${{ github.event.inputs.message || 'chore: update submodules' }}"
          body: |
            ## Submodule Updates

            Automated submodule update triggered manually.

            ### Checklist
            - [ ] Changes reviewed
            - [ ] Ready to merge
          delete-branch: true
          draft: false

      - name: Auto-merge PR
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          PR_NUM=$(gh pr list --head update-submodules-${{ github.run_id }} --repo adminlove520/multi-CyberSecurity --json number --jq '.[0].number')
          echo "PR Number: $PR_NUM"
          # Wait for CI, then merge
          echo "Waiting 30s for CI to start..."
          sleep 30
          # Enable auto-merge (requires branch protection rules to allow this)
          gh pr merge --admin --squash --repo adminlove520/multi-CyberSecurity $PR_NUM 2>&1 || echo "Merge failed or requires approval - PR created for manual review"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
