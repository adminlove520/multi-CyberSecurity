# Submodule 手动更新工作流
# 需要更新时在 GitHub Actions 页面手动触发即可
name: Update Submodules

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Commit message'
        required: false
        default: 'chore: update submodules'

jobs:
  update-submodules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Update submodules
        run: |
          git submodule update --remote --recursive

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet HEAD; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No submodule updates found"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            git diff --stat
          fi

      - name: Create commit and push
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          BRANCH="update-submodules-$(date +%s)"
          git checkout -b "$BRANCH"
          git add .
          git commit -m "${{ github.event.inputs.message || 'chore: update submodules' }}"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Create PR
        if: steps.check_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --repo adminlove520/multi-CyberSecurity \
            --head "${{ steps.push.outputs.branch }}" \
            --base main \
            --title "${{ github.event.inputs.message || 'chore: update submodules' }}" \
            --body "Automated submodule update" \
            --fill)
          echo "PR created: $PR_URL"
