name: Update Submodules

on:
  schedule:
    # 每天 UTC 02:00 运行 (北京时间 10:00)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to update'
        required: false
        default: 'main'
      auto_merge:
        description: 'Auto merge PR if checks pass'
        required: false
        default: 'true'

jobs:
  update-submodules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Update submodules
        run: |
          git submodule update --remote --recursive

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet HEAD; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No submodule updates found"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Submodule updates detected"
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        id: create_pr
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: update-submodules-${{ github.run_id }}
          title: 'chore: Update submodules'
          body: |
            ## Submodule Updates
            
            This PR updates the following submodules to their latest versions:
            
            - `vendor/codegraph`
            
            ### Changes
            - Automated daily submodule update
            - Triggered by scheduled workflow
            
            ### Checklist
            - [x] Submodule changes reviewed
            - [x] Integration tests passed
            - [x] Ready to merge
          commit-message: 'chore: update submodules to latest'
          delete-branch: true

      - name: Enable auto-merge
        if: steps.check_changes.outputs.has_changes == 'true' && github.event.inputs.auto_merge != 'false'
        run: |
          echo "PR created: ${{ steps.create_pr.outputs.pull-request-number }}"
          echo "Auto-merge will be enabled after checks pass"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  auto-merge:
    needs: update-submodules
    runs-on: ubuntu-latest
    if: github.event.inputs.auto_merge != 'false'
    steps:
      - name: Auto merge PR
        uses: pascalgn/automerge-action@v0.15.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_METHOD: squash
          MERGE_COMMIT_MESSAGE: 'chore: update submodules to latest'
          MERGE_RETRY_SLEEP: 60000
          MERGE_RETRIES: 3
