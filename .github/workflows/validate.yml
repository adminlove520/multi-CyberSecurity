# multi-CyberSecurity 自动化验证
# 每次 Push 和 PR 时验证新格式 frontmatter 与 skills_index.json 一致性
name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run all validations
        id: validation
        run: |
          pip install -q pyyaml

          python3 << 'PYEOF'
          import json, os, re, sys
          from pathlib import Path
          import yaml

          errors_all = []
          results = {"index": None, "frontmatter": None, "attack_mapping": None}

          # --- 1. Validate skills_index.json exists and is valid ---
          try:
              with open('skills_index.json', 'r', encoding='utf-8') as f:
                  index = json.load(f)
              results["index"] = f"PASS: {len(index)} skills indexed"
              print(f"[PASS] skills_index.json: {len(index)} skills")
          except Exception as e:
              results["index"] = f"ERROR: {e}"
              errors_all.append(f"skills_index.json: {e}")
              print(f"[ERROR] skills_index.json: {e}")

          # --- 2. Validate frontmatter in all skill files ---
          fm_errors = []
          fm_total = 0
          for cat_dir in sorted(Path('.').iterdir()):
              if not cat_dir.is_dir() or not cat_dir.name[0].isdigit():
                  continue
              skills_dir = cat_dir / 'skills'
              if not skills_dir.exists():
                  continue
              for fname in sorted(skills_dir.glob('*.md')):
                  if fname.name == 'README.md':
                      continue
                  fm_total += 1
                  with open(fname, 'r', encoding='utf-8') as f:
                      content = f.read()
                  if not content.startswith('---'):
                      fm_errors.append(f'{fname}: missing YAML frontmatter')
                      continue
                  m = re.match(r'^---\n(.*?)\n---', content, re.DOTALL)
                  if not m:
                      fm_errors.append(f'{fname}: YAML frontmatter format error')
                      continue
                  fm_text = m.group(1).strip()
                  try:
                      fm = yaml.safe_load(fm_text)
                  except Exception as e:
                      fm_errors.append(f'{fname}: YAML parse error: {e}')
                      continue
                  if not fm:
                      fm_errors.append(f'{fname}: empty frontmatter')
                      continue
                  # Check required fields (new format)
                  required = ['name', 'description', 'domain', 'subdomain', 'tags',
                              'version', 'author', 'license', 'nist_csf', 'mitre_attack']
                  for field in required:
                      if field not in fm or fm[field] is None:
                          fm_errors.append(f'{fname}: missing field [{field}]')
                  # name should be kebab-case
                  name = fm.get('name', '')
                  if name and not re.match(r'^[\w]+(-[\w]+)*$', name):
                      fm_errors.append(f'{fname}: name should be kebab-case, got "{name}"')

          if fm_errors:
              results["frontmatter"] = f"FAIL: {len(fm_errors)} issues"
              errors_all.extend(fm_errors[:20])
              print(f"[FAIL] Frontmatter: {len(fm_errors)} issues out of {fm_total} files")
          else:
              results["frontmatter"] = f"PASS: {fm_total} files validated"
              print(f"[PASS] Frontmatter: {fm_total} files validated")

          # --- 3. ATT&CK mapping coverage ---
          attack_skills = 0
          all_attack_ids = set()
          for cat_dir in sorted(Path('.').iterdir()):
              if not cat_dir.is_dir() or not cat_dir.name[0].isdigit():
                  continue
              skills_dir = cat_dir / 'skills'
              if not skills_dir.exists():
                  continue
              for fname in sorted(skills_dir.glob('*.md')):
                  if fname.name == 'README.md':
                      continue
                  with open(fname, 'r', encoding='utf-8') as f:
                      content = f.read()
                  m = re.match(r'^---\n(.*?)\n---', content, re.DOTALL)
                  if not m:
                      continue
                  try:
                      fm = yaml.safe_load(m.group(1).strip())
                  except:
                      continue
                  if not fm:
                      continue
                  attack = fm.get('mitre_attack', [])
                  if attack and attack != 'all' and isinstance(attack, list) and any(str(a).strip() for a in attack):
                      attack_skills += 1
                      for t in attack:
                          if re.match(r'^T\d{4}(\.\d{3})?$', str(t).strip()):
                              all_attack_ids.add(str(t).strip())

          results["attack_mapping"] = f"PASS: {attack_skills} skills with {len(all_attack_ids)} ATT&CK techniques"
          print(f"[INFO] ATT&CK: {attack_skills} skills, {len(all_attack_ids)} unique techniques")

          # --- Summary ---
          print("\n" + "=" * 50)
          passed = sum(1 for v in results.values() if v and v.startswith("PASS"))
          total = len(results)
          print(f"Validation Summary: {passed}/{total} checks passed")

          with open("/tmp/val_results.json", "w") as f:
              json.dump(results, f)
          with open("/tmp/val_errors.txt", "w") as f:
              f.write("\n".join(errors_all))

          if errors_all:
              sys.exit(1)
          PYEOF

      - name: Generate job summary
        if: always()
        run: |
          python3 << 'PYEOF'
          import json, os

          results = {}
          errors = []

          if os.path.exists("/tmp/val_results.json"):
              with open("/tmp/val_results.json") as f:
                  results = json.load(f)
          if os.path.exists("/tmp/val_errors.txt"):
              raw = open("/tmp/val_errors.txt").read().strip()
              errors = raw.split("\n") if raw else []

          md = []
          md.append("## Validation Report\n")
          md.append(f"**Trigger**: ${{ github.event_name }} on ${{ github.ref }}")
          md.append(f"**Commit**: `${{ github.sha }}`\n")
          md.append("| Check | Status |")
          md.append("|-------|--------|")
          labels = {
              "index": "skills_index.json",
              "frontmatter": "Skill Frontmatter (新格式)",
              "attack_mapping": "ATT&CK Coverage"
          }
          for key, label in labels.items():
              val = results.get(key, "N/A")
              if val and val.startswith("PASS"):
                  status = f"✅ {val}"
              elif val and val.startswith("FAIL"):
                  status = f"❌ {val}"
              elif val and val.startswith("ERROR"):
                  status = f"🔴 {val}"
              else:
                  status = f"⚠️ {val}"
              md.append(f"| {label} | {status} |")

          if errors:
              md.append(f"\n### Errors ({len(errors)})\n")
              for e in errors[:20]:
                  md.append(f"- `{e}`")
              if len(errors) > 20:
                  md.append(f"\n... and {len(errors) - 20} more")

          with open("/tmp/val_summary.md", "w") as f:
              f.write("\n".join(md))
          PYEOF

          cat /tmp/val_summary.md >> "$GITHUB_STEP_SUMMARY"
