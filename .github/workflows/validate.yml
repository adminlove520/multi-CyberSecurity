# CyberSecurity-Skills 自动验证工作流
# 每次 Push 和 PR 时验证 index.json 与实际文件的一致性
name: Validate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate index.json against schema
        run: |
          pip install -q jsonschema
          python3 << 'PYEOF'
          import json, sys
          from jsonschema import validate, ValidationError

          with open('index.json', 'r', encoding='utf-8') as f:
              index = json.load(f)

          with open('index.schema.json', 'r', encoding='utf-8') as f:
              schema = json.load(f)

          try:
              validate(instance=index, schema=schema)
              print('  index.json: Schema validation passed')
          except ValidationError as e:
              print(f'  index.json: Schema validation failed: {e.message}')
              sys.exit(1)
          PYEOF

      - name: Run validate CLI
        run: python skill_query.py validate

      - name: Validate frontmatter in all skill files
        run: |
          python3 << 'PYEOF'
          import os, sys, re

          errors = []
          for root, dirs, files in os.walk('.'):
              # Only check module skill directories (NN-xxx-yyy/skills), skip framework/skills
              if not root.endswith(os.sep + 'skills'):
                  continue
              if os.sep + 'framework' + os.sep in root:
                  continue
              for fname in sorted(files):
                  if not fname.endswith('.md'):
                      continue
                  fpath = os.path.join(root, fname)
                  with open(fpath, 'r', encoding='utf-8') as f:
                      content = f.read()
                  if not content.startswith('---'):
                      errors.append(f'{fpath}: missing YAML frontmatter')
                      continue
                  match = re.match(r'^---\n(.*?)\n---\n', content, re.DOTALL)
                  if not match:
                      errors.append(f'{fpath}: YAML frontmatter format error')
                      continue
                  yaml_text = match.group(1)
                  required = ['id:', 'title:', 'category:', 'difficulty:', 'tools:', 'last_updated:']
                  for field in required:
                      if field not in yaml_text:
                          errors.append(f'{fpath}: missing field {field}')
                  id_match = re.search(r'id:\s*"?(\d+-\d+)"?', yaml_text)
                  if not id_match:
                      errors.append(f'{fpath}: id format incorrect (expected NN-NNN)')

          if errors:
              print(f'Found {len(errors)} issues:')
              for e in errors:
                  print(f'  - {e}')
              sys.exit(1)
          else:
              print('  All skill files frontmatter validation passed')
          PYEOF

      - name: Check for broken relative links
        run: |
          python3 << 'PYEOF'
          import os, re, sys

          errors = []
          link_pattern = re.compile(r'\]\(([^)]+)\)')

          for root, dirs, files in os.walk('.'):
              if '.git' in root:
                  continue
              for fname in files:
                  if not fname.endswith('.md'):
                      continue
                  fpath = os.path.join(root, fname)
                  with open(fpath, 'r', encoding='utf-8') as f:
                      content = f.read()
                  for match in link_pattern.finditer(content):
                      link = match.group(1)
                      if link.startswith('http://') or link.startswith('https://'):
                          continue
                      if link.startswith('#'):
                          continue
                      if link.startswith('mailto:'):
                          continue
                      # Skip code snippet artifacts
                      if '{' in link or '}' in link:
                          continue
                      # Skip template placeholder paths
                      if link.startswith('./attachments/'):
                          continue
                      # Skip anchor-only links (no path separator)
                      if '/' not in link and '.' not in link:
                          continue
                      base_dir = os.path.dirname(fpath)
                      target = os.path.normpath(os.path.join(base_dir, link))
                      if not os.path.exists(target):
                          errors.append(f'{fpath}: broken link -> {link}')

          if errors:
              for e in errors[:20]:
                  print(f'  - {e}')
              sys.exit(1)
          else:
              print('  All relative links are valid')
          PYEOF
