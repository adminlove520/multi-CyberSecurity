name: Sync Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to sync (e.g., 4.1.2)'
        required: true

jobs:
  sync-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: extract_version
        run: |
          VERSION=${{ github.event.inputs.version }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Update version in files
        run: |
          VERSION=${{ steps.extract_version.outputs.version }}
          
          # Update README.md
          sed -i "s/multi-CyberSecurity v[0-9]\+\.[0-9]\+\(\.[0-9]\+\)\?/multi-CyberSecurity v$VERSION/g" README.md
          sed -i "s/version-[0-9]\+\.[0-9]\+\(\.[0-9]\+\)\?-/version-$VERSION-/g" README.md
          
          # Update cli.py
          sed -i "s/multi-CyberSecurity v[0-9]\+\.[0-9]\+\(\.[0-9]\+\)\?/multi-CyberSecurity v$VERSION/g" cli.py
          
          # Update framework/skills/index.md
          sed -i "s/Framework Version: v[0-9]\+\.[0-9]\+\(\.[0-9]\+\)\?/Framework Version: v$VERSION/g" framework/skills/index.md
          
          echo "Version updated to v$VERSION"

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet HEAD; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No version changes needed"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Version changes detected"
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "chore: sync version to v${{ steps.extract_version.outputs.version }}"
          git push origin main
