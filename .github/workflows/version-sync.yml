# multi-CyberSecurity 版本自动同步
# push到main时自动检测并更新版本号，同时打tag
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Force bump type (patch|minor|major)'
        required: false
        type: choice
        options:
          - ''
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Detect bump and sync version
        id: version
        run: |
          python3 << 'PYEOF'
          import json, re, sys, os
          from pathlib import Path

          project_root = Path(".")

          # Read current version from index.json (source of truth)
          try:
              with open(project_root / "index.json", "r", encoding="utf-8") as f:
                  index_data = json.load(f)
              current_ver = index_data.get("meta", {}).get("version", "")
              if not current_ver:
                  print("WARNING: No version in index.json meta, skipping release")
                  with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                      f.write("version=\n")
                  sys.exit(0)
          except Exception as e:
              print(f"ERROR reading index.json: {e}")
              sys.exit(1)

          parts = current_ver.split(".")
          if len(parts) != 3:
              print(f"ERROR: Invalid version format '{current_ver}'")
              sys.exit(1)
          major, minor, patch = int(parts[0]), int(parts[1]), int(parts[2])

          # Determine bump type
          commit_msg = os.environ.get("COMMIT_MSG", "")
          force_bump = os.environ.get("FORCE_BUMP", "")
          msg_lower = commit_msg.lower()

          # Skip if already a version bump commit (prevent infinite loop)
          if "chore: bump version" in commit_msg.lower():
              print("Skipping: already a version bump commit")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("version=\n")
              sys.exit(0)

          if force_bump:
              bump = force_bump
          elif any(kw in msg_lower for kw in ["breaking", "major", "incompatible"]):
              bump = "major"
          elif any(kw in msg_lower for kw in ["feat:", "feature", "new module", "new skill"]):
              bump = "minor"
          else:
              bump = "patch"

          # Calculate new version
          if bump == "major":
              new_ver = f"{major + 1}.0.0"
          elif bump == "minor":
              new_ver = f"{major}.{minor + 1}.0"
          else:
              new_ver = f"{major}.{minor}.{patch + 1}"

          old_ver = current_ver
          print(f"Version: v{old_ver} -> v{new_ver} (bump: {bump})")
          print(f"Commit: {commit_msg[:80]}")

          # Update index.json
          with open(project_root / "index.json", "r", encoding="utf-8") as f:
              index_data = json.load(f)
          index_data["meta"]["version"] = new_ver
          with open(project_root / "index.json", "w", encoding="utf-8") as f:
              json.dump(index_data, f, indent=2, ensure_ascii=False)

          # Update README title if it has a version
          readme_path = project_root / "README.md"
          if readme_path.exists():
              content = readme_path.read_text(encoding="utf-8")
              new_content = re.sub(
                  r"(# multi-CyberSecurity) v\d+\.\d+\.\d+",
                  rf"\1 v{new_ver}",
                  content
              )
              if new_content != content:
                  readme_path.write_text(new_content, encoding="utf-8")
                  print("Updated README.md")

          # Update skills_index.json version for all skills
          skills_path = project_root / "skills_index.json"
          if skills_path.exists():
              with open(skills_path, "r", encoding="utf-8") as f:
                  skills_data = json.load(f)
              for skill in skills_data:
                  skill["version"] = new_ver
              with open(skills_path, "w", encoding="utf-8") as f:
                  json.dump(skills_data, f, indent=2, ensure_ascii=False)
              print(f"Updated {len(skills_data)} skills to v{new_ver}")

          # Write outputs
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={new_ver}\n")
              f.write(f"old_version={old_ver}\n")
              f.write(f"bump={bump}\n")

          print(f"Done: v{old_ver} -> v{new_ver}")
          PYEOF

      - name: Commit version bump
        if: steps.version.outputs.version != ''
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.json README.md skills_index.json
          git commit -m "chore: bump version v${{ steps.version.outputs.old_version }} -> v${{ steps.version.outputs.version }}"
          git push origin main

      - name: Create tag
        if: steps.version.outputs.version != ''
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
            echo "Created tag $TAG"
          fi

      - name: GitHub Release
        if: steps.version.outputs.version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --verify-tag
          fi

      - name: Summary
        if: steps.version.outputs.version != ''
        run: |
          echo "## Release: v${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Previous | v${{ steps.version.outputs.old_version }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| New | v${{ steps.version.outputs.version }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bump | ${{ steps.version.outputs.bump }} |" >> "$GITHUB_STEP_SUMMARY"
