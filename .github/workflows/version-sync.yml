name: Sync Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      create_tag:
        description: 'Create git tag'
        required: false
        type: boolean
        default: true
      create_release:
        description: 'Create GitHub Release'
        required: false
        type: boolean
        default: false

jobs:
  sync-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Auto bump version and sync all files
        id: version
        run: |
          BUMP="${{ github.event.inputs.bump }}"

          python3 << 'PYEOF'
          import re, sys, os
          from pathlib import Path

          bump = os.environ["BUMP"]
          project_root = Path(".")

          # --- Step 1: Read current version from README.md ---
          readme = (project_root / "README.md").read_text(encoding="utf-8")
          match = re.search(r"multi-CyberSecurity v(\d+\.\d+\.\d+)", readme)
          if not match:
              print("ERROR: Cannot detect current version from README.md")
              sys.exit(1)
          parts = match.group(1).split(".")
          major, minor, patch = int(parts[0]), int(parts[1]), int(parts[2])
          old_ver = f"{major}.{minor}.{patch}"

          # --- Step 2: Bump ---
          if bump == "major":
              new_ver = f"{major + 1}.0.0"
          elif bump == "minor":
              new_ver = f"{major}.{minor + 1}.0"
          else:
              new_ver = f"{major}.{minor}.{patch + 1}"

          print(f"Current: v{old_ver}  ->  New: v{new_ver} (bump: {bump})")

          # --- Step 3: Update all files ---
          updated_files = []

          def try_update(filepath, patterns):
              if not filepath.exists():
                  return
              content = filepath.read_text(encoding="utf-8")
              original = content
              for pat, repl in patterns:
                  content = re.sub(pat, repl, content)
              if content != original:
                  filepath.write_text(content, encoding="utf-8")
                  updated_files.append(str(filepath.relative_to(project_root)))

          # README.md
          try_update(project_root / "README.md", [
              (r"multi-CyberSecurity v\d+\.\d+\.\d+", f"multi-CyberSecurity v{new_ver}"),
              (r"version-\d+\.\d+\.\d+-", f"version-{new_ver}-"),
          ])

          # cli.py
          try_update(project_root / "cli.py", [
              (r"multi-CyberSecurity v\d+\.\d+\.\d+(?: Enhanced)?", f"multi-CyberSecurity v{new_ver} Enhanced"),
              (r"multi-CyberSecurity v\d+\.\d+\.\d+ - AI", f"multi-CyberSecurity v{new_ver} - AI"),
          ])

          # framework/skills/index.md
          try_update(project_root / "framework" / "skills" / "index.md", [
              (r"Framework Version: v\d+\.\d+\.\d+", f"Framework Version: v{new_ver}"),
          ])

          # index.json
          try_update(project_root / "index.json", [
              (r'"version":\s*"[^"]+"', f'"version": "{new_ver}"'),
          ])

          if not updated_files:
              print("No files needed updating")
              sys.exit(0)

          print(f"Updated {len(updated_files)} files:")
          for f in updated_files:
              print(f"  - {f}")

          # --- Step 4: Verify (only check project version patterns, not IPs) ---
          print("\nVerifying consistency...")
          for f in updated_files:
              content = (project_root / f).read_text(encoding="utf-8")
              for pattern in [r"multi-CyberSecurity v(\d+\.\d+\.\d+)",
                             r"version-(\d+\.\d+\.\d+)-",
                             r"Framework Version: v(\d+\.\d+\.\d+)",
                             r'"version":\s*"(\d+\.\d+\.\d+)"']:
                  for m in re.finditer(pattern, content):
                      found = m.group(1)
                      if found != new_ver:
                          print(f"ERROR: {f} still has v{found}, expected v{new_ver}")
                          sys.exit(1)

          print(f"All files consistent at v{new_ver}")

          # Write version to file for shell to read
          with open("/tmp/ver_new.txt", "w") as f:
              f.write(new_ver)
          with open("/tmp/ver_old.txt", "w") as f:
              f.write(old_ver)
          PYEOF

          # Read version from temp files and set outputs
          VERSION_NEW=$(cat /tmp/ver_new.txt)
          VERSION_OLD=$(cat /tmp/ver_old.txt)
          echo "version=$VERSION_NEW" >> "$GITHUB_OUTPUT"
          echo "old_version=$VERSION_OLD" >> "$GITHUB_OUTPUT"

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet HEAD; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "chore: bump version v${{ steps.version.outputs.old_version }} -> v${{ steps.version.outputs.version }}"
          git push origin main

      - name: Create git tag
        if: steps.check_changes.outputs.has_changes == 'true' && github.event.inputs.create_tag == 'true'
        run: |
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        if: steps.check_changes.outputs.has_changes == 'true' && github.event.inputs.create_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes \
            --verify-tag
